<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Will Access Approved</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        padding: 20px;
      }
      .container {
        max-width: 600px;
        background: #ffffff;
        padding: 20px;
        margin: auto;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }
      .key-box {
        font-size: 20px;
        font-weight: bold;
        background-color: #e0f7fa;
        color: #00796b;
        padding: 15px;
        text-align: center;
        border-radius: 5px;
        margin: 20px 0;
        word-break: break-all;
      }
      .footer {
        margin-top: 20px;
        font-size: 12px;
        color: #666;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Hello {{name}},</h2>
      <p>Your access request to view the will <strong>{{willName}}</strong> has been approved.</p>
      <p>Please use the following secret key to access the will:</p>
      <div class="key-box">{{secretKey}}</div>
      <p><strong>Note:</strong> Keep this key confidential. If you did not make this request, please contact support immediately.</p>
      <p class="footer">Thank you for using our service.</p>
    </div>
  </body>
</html>
